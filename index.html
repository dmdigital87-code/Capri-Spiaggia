const buildBeachGridCfg=(frontRows=3,frontPerSide=5,backRows=14,backPerSide=4)=>{const rows=[];
  for(let f=1;f<=frontRows;f++){const row=[];for(let c=0;c<frontPerSide;c++)row.push({id:uid(),type:"umbrella",num:0,bookings:[],fila:f});row.push({id:uid(),type:"walkway",num:null,bookings:[],fila:f,label:`${f}ª FILA`});for(let c=0;c<frontPerSide;c++)row.push({id:uid(),type:"umbrella",num:0,bookings:[],fila:f});rows.push(row);}
  for(let f=frontRows+1;f<=frontRows+backRows;f++){const row=[];for(let c=0;c<backPerSide;c++)row.push({id:uid(),type:"umbrella",num:0,bookings:[],fila:f});row.push({id:uid(),type:"empty",num:null,bookings:[],fila:f});row.push({id:uid(),type:"walkway",num:null,bookings:[],fila:f,label:`${f}ª FILA`});row.push({id:uid(),type:"empty",num:null,bookings:[],fila:f});for(let c=0;c<backPerSide;c++)row.push({id:uid(),type:"umbrella",num:0,bookings:[],fila:f});rows.push(row);}
  let n=1;rows.forEach(row=>{const umbs=row.filter(c=>c.type==="umbrella");for(let i=umbs.length-1;i>=0;i--)umbs[i].num=n++;});
  return rows;};
const buildCabinRowsCfg=(cabinRows=2,cabinsPerRow=15)=>{const rows=[];let n=1;for(let r=0;r<cabinRows;r++){const row=[];for(let c=0;c<cabinsPerRow;c++)row.push({id:uid(),type:"cabana",num:n++,bookings:[]});rows.push(row);}return rows;};

const getConvStagione=(fromDate)=>{const m=new Date(fromDate).getMonth()+1;return(m>=7&&m<=8)?"alta":"bassa";};
const calcConvPrice=(pacchetto,days,fromDate)=>{
  const stagKey=getConvStagione(fromDate);
  const stag=CONV_TARIFFE[stagKey];
  const pkg=stag[pacchetto];
  if(!pkg)return 0;
  const weeks=Math.floor(days/7);const rem=days%7;
  return weeks*pkg.sett+rem*pkg.gg;
};

const MiniBarChart=({data,labelKey,bars,height=180})=>{
  const maxVal=Math.max(...data.flatMap(d=>bars.map(b=>d[b.key]||0)),1);
  const bw=Math.floor(260/data.length/(bars.length+0.5));const gap=4;
  const totalW=data.length*(bars.length*bw+gap*2)+20;
  return(<svg viewBox={`0 0 ${Math.max(totalW,300)} ${height+30}`} style={{width:"100%",height:height+30}}>
    {data.map((d,i)=>{const x=20+i*(bars.length*bw+gap*2);return(<g key={i}>
      {bars.map((b,bi)=>{const val=d[b.key]||0;const h=Math.max((val/maxVal)*(height-20),2);return(<g key={bi}>
        <rect x={x+bi*(bw+1)} y={height-h} width={bw} height={h} rx={3} fill={b.color} opacity={0.85}/>
        {val>0&&<text x={x+bi*(bw+1)+bw/2} y={height-h-4} textAnchor="middle" fontSize="9" fill={T.darkSoft}>{val}</text>}
      </g>);})}
      <text x={x+bars.length*bw/2} y={height+14} textAnchor="middle" fontSize="10" fill={T.darkSoft} fontFamily={font}>{d[labelKey]}</text>
    </g>);})}
  </svg>);
};

/* ─── CALENDAR ─── */
const CalendarView=({grid,cabins,selectedDate,setSelectedDate})=>{
  const[viewMode,setViewMode]=useState("week");
  const weekDates=getWeekDates(selectedDate);const cur=new Date(selectedDate);
  const mDays=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate();
  const fDay=(new Date(cur.getFullYear(),cur.getMonth(),1).getDay()+6)%7;
  const cnt=date=>{let t=0,b=0;grid.forEach(r=>r.forEach(c=>{if(c.type==="umbrella"){t++;if(c.bookings?.some(bk=>date>=bk.from&&date<=bk.to))b++;}}));cabins.forEach(r=>r.forEach(c=>{t++;if(c.bookings?.some(bk=>date>=bk.from&&date<=bk.to))b++;}));return{t,b,a:t-b};};
  const allBk=useMemo(()=>{const bks=[];grid.forEach((row,r)=>row.forEach((cell,c)=>cell.bookings?.forEach(b=>bks.push({...b,r,c,type:cell.type,num:cell.num}))));cabins.forEach((row,r)=>row.forEach((cell,c)=>cell.bookings?.forEach(b=>bks.push({...b,r,c,type:"cabana",num:cell.num}))));return bks.sort((a,b)=>a.from.localeCompare(b.from));},[grid,cabins]);
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
      <div style={{display:"flex",gap:6}}>{["week","month"].map(m=><button key={m} onClick={()=>setViewMode(m)} style={{...btnS(viewMode===m?T.accent:"rgba(0,0,0,.04)",viewMode===m?"#fff":T.dark),padding:"8px 16px",fontSize:12}}>{m==="week"?"Settimana":"Mese"}</button>)}</div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <button onClick={()=>setSelectedDate(addDays(selectedDate,viewMode==="week"?-7:-30))} style={{...btnS("rgba(0,0,0,.04)",T.dark),padding:"8px 12px"}}>‹</button>
        <span style={{fontFamily:fontD,fontSize:18,color:T.dark,minWidth:160,textAlign:"center"}}>{MONTHS[cur.getMonth()]} {cur.getFullYear()}</span>
        <button onClick={()=>setSelectedDate(addDays(selectedDate,viewMode==="week"?7:30))} style={{...btnS("rgba(0,0,0,.04)",T.dark),padding:"8px 12px"}}>›</button>
      </div>
    </div>
    {viewMode==="week"?(<div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8}}>
      {weekDates.map((d,i)=>{const c=cnt(d);const sel=d===selectedDate;return(<div key={d} onClick={()=>setSelectedDate(d)} style={{...cardS,cursor:"pointer",textAlign:"center",padding:"14px 8px",border:sel?`2px solid ${T.accent}`:`1px solid ${T.border}`,background:sel?"rgba(226,97,59,.04)":T.card}}>
        <div style={{fontSize:11,color:T.darkSoft,fontWeight:600}}>{DAYS_S[i]}</div><div style={{fontFamily:fontD,fontSize:22,color:T.dark,margin:"6px 0"}}>{new Date(d).getDate()}</div><div style={{fontSize:18,marginBottom:4}}>{c.a>0?"🟢":"🔴"}</div><div style={{fontSize:11,color:T.darkSoft}}>{c.b}/{c.t}</div></div>);})}</div>)
    :(<div style={cardS}><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
      {DAYS_S.map(d=><div key={d} style={{textAlign:"center",fontSize:11,color:T.darkSoft,fontWeight:600,padding:6}}>{d}</div>)}
      {Array.from({length:fDay}).map((_,i)=><div key={`e${i}`}/>)}
      {Array.from({length:mDays}).map((_,i)=>{const d=`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`;const c=cnt(d);const pct=c.t?Math.round(c.b/c.t*100):0;const sel=d===selectedDate;
        return(<div key={d} onClick={()=>setSelectedDate(d)} style={{textAlign:"center",padding:"8px 2px",borderRadius:8,cursor:"pointer",background:sel?"rgba(226,97,59,.1)":pct>80?"rgba(231,76,60,.06)":"transparent",border:sel?`2px solid ${T.accent}`:"2px solid transparent"}}><div style={{fontSize:13,fontWeight:sel?700:400,color:T.dark}}>{i+1}</div><div style={{fontSize:10,color:pct>80?T.warn:pct>50?T.gold:T.ok}}>{pct}%</div></div>);})}</div></div>)}
    <div style={cardS}>
      <h3 style={{fontFamily:fontD,fontSize:18,color:T.dark,marginBottom:12}}>Prenotazioni del {fmtDate(selectedDate)}</h3>
      {allBk.filter(b=>selectedDate>=b.from&&selectedDate<=b.to).length===0?<p style={{color:T.darkSoft,fontSize:13}}>Nessuna prenotazione.</p>:
      <div style={{display:"flex",flexDirection:"column",gap:8}}>{allBk.filter(b=>selectedDate>=b.from&&selectedDate<=b.to).map((b,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"rgba(0,0,0,.02)",borderRadius:10}}><div><span style={{fontWeight:600,color:T.dark,fontSize:13}}>{b.type==="cabana"?"🏠":"🏖️"} {b.clientName}</span><span style={{fontSize:12,color:T.darkSoft,marginLeft:8}}>{b.type==="cabana"?`C${b.num}`:`Omb.${b.num}`} · {fmtDate(b.from)}→{fmtDate(b.to)}</span></div><span style={{fontFamily:fontD,fontSize:16,color:T.accent}}>€{b.total}</span></div>))}</div>}
    </div>
  </div>);
};

  const saveApiKey=()=>{const k=apiKeyInput.trim();if(!k)return;setApiKey(k);try{localStorage.setItem("bc_apikey",k);}catch(e){}setShowKeySetup(false);setApiKeyInput("");};
  const buildSystemPrompt=()=>{
    let tU=0,bU=0;est.grid.forEach(r=>r.forEach(c=>{if(c.type==="umbrella"){tU++;if(c.bookings?.some(b=>{const td=today();return td>=b.from&&td<=b.to;}))bU++;}}));
    return `Sei l'assistente del Bagno Capri. Rispondi in italiano. Ombrelloni: ${bU}/${tU} occupati. Clienti: ${clients.length}. Prezzi base: Omb €${est.pricing.umbrella}/gg, Lett €${est.pricing.sunbed}/gg. Tariffe convenzionate: bassa stag Omb+Let €45/sett €9/gg, alta stag Omb+Let €55/sett €10/gg. Mezza giornata: ${est.halfDay?.enabled?"attiva":"disattivata"}.`;
  };
  const send=async(text)=>{const msg=text||input.trim();if(!msg||loading)return;if(!apiKey){setShowKeySetup(true);return;}setInput("");const newMsgs=[...messages,{role:"user",content:msg}];setMessages(newMsgs);setLoading(true);
    try{const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:buildSystemPrompt(),messages:newMsgs.map(m=>({role:m.role,content:m.content}))})});
      const data=await resp.json();const reply=data.content?.[0]?.text||"Errore.";setMessages(p=>[...p,{role:"assistant",content:reply}]);
    }catch(e){setMessages(p=>[...p,{role:"assistant",content:"⚠️ Errore di connessione."}]);}setLoading(false);};
  const renderMd=(text)=>text.split("\n").map((line,i)=>{let el=line.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/`(.*?)`/g,`<code style="background:rgba(0,0,0,.07);padding:1px 5px;border-radius:4px">$1</code>`);if(line.startsWith("- "))el="• "+el.slice(2);return<div key={i} dangerouslySetInnerHTML={{__html:el}} style={{lineHeight:1.55,minHeight:line?undefined:6}}/>;});
  return(<>
    <button onClick={()=>setOpen(o=>!o)} style={{position:"fixed",bottom:24,right:24,width:56,height:56,borderRadius:"50%",background:`linear-gradient(135deg,${T.sea},${T.seaLight})`,border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(14,124,140,.4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,zIndex:900}}>{open?"✕":"🤿"}</button>
    {open&&<div style={{position:"fixed",bottom:92,right:24,width:370,maxWidth:"calc(100vw - 48px)",height:520,background:T.white,borderRadius:20,boxShadow:"0 16px 48px rgba(0,0,0,.18)",display:"flex",flexDirection:"column",zIndex:900,animation:"pop .25s",overflow:"hidden"}}>
      <div style={{background:`linear-gradient(135deg,${T.sea},${T.seaLight})`,padding:"14px 18px",display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🤿</div>
        <div><div style={{fontWeight:700,color:"#fff",fontSize:14}}>Assistente</div><div style={{fontSize:11,color:"rgba(255,255,255,.75)"}}>{apiKey?"✅ Connesso":"⚠️ API key"}</div></div>
        <button onClick={()=>setShowKeySetup(s=>!s)} style={{marginLeft:"auto",background:"rgba(255,255,255,.15)",border:"none",borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:14}}>⚙️</button>
      </div>
      {showKeySetup&&<div style={{padding:"12px 14px",background:"rgba(14,124,140,.06)",borderBottom:`1px solid ${T.border}`}}>
        {apiKey?<div style={{display:"flex",gap:6}}><div style={{flex:1,fontSize:11,color:T.darkSoft,fontFamily:"monospace",background:"rgba(0,0,0,.04)",borderRadius:8,padding:"6px 10px"}}>...{apiKey.slice(-6)}</div><button onClick={()=>{setApiKey("");try{localStorage.removeItem("bc_apikey");}catch(e){}}} style={{...btnS(T.warn),padding:"5px 10px",fontSize:11}}>Rimuovi</button></div>
        :<div style={{display:"flex",gap:6}}><input value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveApiKey()} placeholder="sk-ant-..." style={{...inputSt,fontSize:12,flex:1}} type="password"/><button onClick={saveApiKey} style={{...btnS(T.sea),padding:"7px 12px",fontSize:12}}>Salva</button></div>}
      </div>}
      <div style={{flex:1,overflowY:"auto",padding:"14px 14px 8px",display:"flex",flexDirection:"column",gap:10}}>
        {messages.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>{m.role==="assistant"&&<div style={{width:26,height:26,borderRadius:"50%",background:`linear-gradient(135deg,${T.sea},${T.seaLight})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0,marginRight:6,marginTop:2}}>🤿</div>}<div style={{maxWidth:"82%",padding:"10px 13px",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",background:m.role==="user"?`linear-gradient(135deg,${T.accent},#e8754f)`:"rgba(0,0,0,.04)",color:m.role==="user"?"#fff":T.dark,fontSize:13}}>{m.role==="assistant"?renderMd(m.content):m.content}</div></div>)}
        {loading&&<div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:26,height:26,borderRadius:"50%",background:`linear-gradient(135deg,${T.sea},${T.seaLight})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>🤿</div><div style={{padding:"10px 14px",background:"rgba(0,0,0,.04)",borderRadius:"16px 16px 16px 4px",display:"flex",gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:T.sea,animation:`fadeIn .6s ${i*.15}s infinite alternate`}}/>)}</div></div>}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:"10px 12px",borderTop:`1px solid ${T.border}`,display:"flex",gap:8}}>
        <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),send())} placeholder="Scrivi..." style={{...inputSt,padding:"9px 13px",fontSize:13,flex:1,borderRadius:20}} disabled={loading||!apiKey}/>
        <button onClick={()=>send()} disabled={!input.trim()||loading||!apiKey} style={{...btnS(input.trim()&&!loading&&apiKey?T.sea:"rgba(0,0,0,.08)",input.trim()&&!loading&&apiKey?"#fff":T.darkSoft),padding:"9px 14px",borderRadius:20,fontSize:13}}>↑</button>
      </div>
    </div>}
  </>);
};

/* ═══════ LOCAL STORAGE ═══════ */
const LS_KEY="bagnocapri_v1";
const loadData=()=>{try{const r=localStorage.getItem(LS_KEY);return r?JSON.parse(r):null;}catch(e){return null;}};
const saveData=(data)=>{try{localStorage.setItem(LS_KEY,JSON.stringify(data));return true;}catch(e){return false;}};

/* ═══════ MAIN APP ═══════ */
function App(){
  const saved=useMemo(()=>loadData(),[]);
  const[est,setEstRaw]=useState(()=>{const d=saved?.est||defaultData();if(d.grid)renumberGrid(d.grid);return d;});
  const[users,setUsers]=useState(()=>saved?.users||defaultUsers());
  const[clients,setClients]=useState(()=>saved?.clients||defaultClients());
  const[inventory,setInventory]=useState(()=>saved?.inventory||{ombrelloni:[],lettini:[],sdraio:[],sedie_regista:[]});
  const[currentUser,setCurrentUser]=useState(null);const[page,setPage]=useState("beach");const[selectedDate,setSelectedDate]=useState(today());
  const[modal,setModal]=useState(null);const[notif,setNotif]=useState(null);const[loginPin,setLoginPin]=useState("");
  const[occModal,setOccModal]=useState(null);
  const[editBk,setEditBk]=useState(null); /* {bkId, extras, total} - for inline editing */
  const[bookForm,setBookForm]=useState({clientName:"",from:today(),days:1,isHalfDay:false,isConv:false,convPkg:"omb_let",prezzoFinale:0,extras:{lettino:0,sdraio:0,sedia_regista:0}});
  const[saveStatus,setSaveStatus]=useState("saved");
  const isAdmin=!!currentUser;

  /* auto-save */
  const saveRef=useRef(null);
  useEffect(()=>{const handler=()=>{try{localStorage.setItem(LS_KEY,JSON.stringify({est,users,clients,inventory}));}catch(e){}};window.addEventListener("beforeunload",handler);return()=>window.removeEventListener("beforeunload",handler);},[est,users,clients,inventory]);
  useEffect(()=>{setSaveStatus("unsaved");clearTimeout(saveRef.current);saveRef.current=setTimeout(()=>{setSaveStatus("saving");saveData({est,users,clients,inventory});setSaveStatus("saved");},300);return()=>clearTimeout(saveRef.current);},[est,users,clients,inventory]);

  const notify=(m,t="ok")=>{setNotif({m,t});setTimeout(()=>setNotif(null),3000);};
  const setEst=fn=>setEstRaw(prev=>typeof fn==="function"?fn(prev):{...prev,...fn});
  const setGrid=fn=>setEstRaw(prev=>({...prev,grid:typeof fn==="function"?fn(prev.grid):fn}));
  const setCabins=fn=>setEstRaw(prev=>({...prev,cabins:typeof fn==="function"?fn(prev.cabins):fn}));

  const calcPrice=(type,days,from,isHalfDay=false)=>{
    const sp=est.seasonPricing?.find(s=>from>=s.from&&from<=s.to);
    const base=sp&&sp[type]!=null?sp[type]:(est.pricing[type]||ITEMS[type]?.price||0);
    let price=isHalfDay&&est.halfDay?.enabled?(est.halfDay[type]??Math.round(base*0.6)):base;
    return Math.round(price*days);
  };

  const getOccupied=(type,date)=>{const items=[];
    if(type==="umbrella"){est.grid.forEach((row,r)=>row.forEach((cell,c)=>{if(cell.type==="umbrella"){const bk=cell.bookings?.find(b=>date>=b.from&&date<=b.to);if(bk)items.push({num:cell.num,fila:cell.fila,client:bk.clientName,from:bk.from,to:bk.to,total:bk.total,isConv:bk.isConv});}}));}
    else{est.cabins.forEach((row,r)=>row.forEach((cell,c)=>{const bk=cell.bookings?.find(b=>date>=b.from&&date<=b.to);if(bk)items.push({num:cell.num,client:bk.clientName,from:bk.from,to:bk.to,total:bk.total,isConv:bk.isConv});}));}
    return items.sort((a,b)=>a.num-b.num);};

  const handleLogin=()=>{const u=users.find(u=>u.pin===loginPin);if(u){setCurrentUser(u);setPage("beach");notify(`Benvenuto, ${u.name}!`);setLoginPin("");}else notify("PIN errato!","err");};
  const onBook=(r,c,cell,bk)=>setModal({type:"history",r,c,cell,src:"grid"});
  const onBookCabin=(r,c,cell,bk)=>setModal({type:"history",r,c,cell,src:"cabin"});
  const startBookFor=(r,c,cell,src)=>{const isCab=cell.type==="cabana";setBookForm({clientName:"",from:selectedDate,to:addDays(selectedDate,0),days:1,isHalfDay:false,isConv:false,convPkg:isCab?"cabina":"omb_let",pacchetto:isCab?"cabina":"omb_let",prezzoFinale:0,sub:null,umbrellaNum:null,extras:{lettino:0,sdraio:0,sedia_regista:0},isCabin:isCab});setModal({type:"book",r,c,cell,src});};
  const startNewBooking=()=>{setBookForm({clientName:"",from:selectedDate,to:addDays(selectedDate,0),days:1,isHalfDay:false,isConv:false,convPkg:"omb_let",pacchetto:"omb_let",prezzoFinale:0,sub:null,umbrellaNum:null,pickType:"umbrella",extras:{lettino:0,sdraio:0,sedia_regista:0},isCabin:false});setModal({type:"newbook"});};
  const findCellByNum=(num,type)=>{if(type==="cabana"){let f=null;est.cabins.forEach((row,r)=>row.forEach((cell,c)=>{if(cell.num===num)f={r,c,cell,src:"cabin"};}));return f;}let f=null;est.grid.forEach((row,r)=>row.forEach((cell,c)=>{if(cell.type==="umbrella"&&cell.num===num)f={r,c,cell,src:"grid"};}));return f;};

  const confirmBooking=()=>{
    if(!bookForm.clientName.trim())return;
    let r,c,cell,src;
    if(modal.type==="newbook"){
      const num=bookForm.umbrellaNum;const type=bookForm.pickType||"umbrella";
      if(!num){notify("Seleziona un numero!","err");return;}
      const found=findCellByNum(num,type==="cabin"?"cabana":"umbrella");
      if(!found){notify("Non trovato!","err");return;}
      r=found.r;c=found.c;cell=found.cell;src=found.src;
    } else {r=modal.r;c=modal.c;cell=modal.cell;src=modal.src;}
    const toDate=bookForm.to||addDays(bookForm.from,bookForm.days-1);
    const nb={id:uid(),clientName:bookForm.clientName,from:bookForm.from,to:toDate,days:bookForm.days,isHalfDay:bookForm.isHalfDay,isConv:bookForm.isConv||false,convPkg:bookForm.convPkg||null,sub:bookForm.sub||null,pacchetto:bookForm.pacchetto||null,total:bookForm.prezzoFinale||0,extras:bookForm.extras||{lettino:0,sdraio:0,sedia_regista:0}};
    if(src==="grid")setGrid(g=>g.map((row,ri)=>row.map((cl,ci)=>ri===r&&ci===c?{...cl,bookings:[...cl.bookings,nb]}:cl)));
    else setCabins(g=>g.map((row,ri)=>row.map((cl,ci)=>ri===r&&ci===c?{...cl,bookings:[...cl.bookings,nb]}:cl)));
    const existingCl=clients.find(cl=>cl.name.toLowerCase()===bookForm.clientName.toLowerCase());
    if(!existingCl)setClients(p=>[...p,{id:uid(),name:bookForm.clientName,phone:"",email:"",notes:"",sub:bookForm.sub||null,created:today()}]);
    setModal(null);notify(`Prenotato per ${bookForm.clientName}!`);
  };
  const freeBk=(bkId,r,c,src)=>{
    if(src==="grid")setGrid(g=>g.map((row,ri)=>row.map((cl,ci)=>ri===r&&ci===c?{...cl,bookings:cl.bookings.filter(b=>b.id!==bkId)}:cl)));
    else setCabins(g=>g.map((row,ri)=>row.map((cl,ci)=>ri===r&&ci===c?{...cl,bookings:cl.bookings.filter(b=>b.id!==bkId)}:cl)));
    notify("Rimossa.");};

  /* ═══ UPDATE EXISTING BOOKING (extras, price) ═══ */
  const updateBooking=(bkId,r,c,src,updates)=>{
    const updater=g=>g.map((row,ri)=>row.map((cl,ci)=>ri===r&&ci===c?{...cl,bookings:cl.bookings.map(b=>b.id===bkId?{...b,...updates}:b)}:cl));
    if(src==="grid")setGrid(updater);else setCabins(updater);
    notify("Aggiornato ✅");
  };
  const calcExtrasPrice=(extras,days)=>{
    const ex=extras||{};
    return((ex.lettino||0)*(est.pricing.sunbed||10)+(ex.sdraio||0)*(est.pricing.sdraio||5)+(ex.sedia_regista||0)*(est.pricing.sedia_regista||5))*days;
  };

  /* ═══ CONV BOOKING SECTION (riusabile nei modal book e newbook) ═══ */
  const ConvBookingSection=()=>{
    const stagKey=getConvStagione(bookForm.from);
    const stag=CONV_TARIFFE[stagKey];
    const pkg=stag[bookForm.convPkg];
    const autoPrice=calcConvPrice(bookForm.convPkg,bookForm.days,bookForm.from);
    const weeks=Math.floor(bookForm.days/7);const rem=bookForm.days%7;
    return(<div style={{background:T.goldSoft,borderRadius:12,padding:"14px 16px",border:`1.5px solid rgba(201,150,58,.3)`,display:"flex",flexDirection:"column",gap:10}}>
      <div style={{fontSize:13,fontWeight:700,color:T.gold}}>🤝 Tariffa Convenzionata — {stag.label}</div>
      {/* Pacchetto convenzionato */}
      <div><label style={labelSt}>Pacchetto</label>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6}}>
          {CONV_PACKAGES.map(p=>{const v=stag[p.key];return v?(<button key={p.key} onClick={()=>{const pr=calcConvPrice(p.key,bookForm.days,bookForm.from);setBookForm(prev=>({...prev,convPkg:p.key,prezzoFinale:pr}));}} style={{padding:"8px 6px",borderRadius:8,fontSize:11,fontFamily:font,cursor:"pointer",textAlign:"left",border:bookForm.convPkg===p.key?`2px solid ${T.gold}`:`1px solid ${T.border}`,background:bookForm.convPkg===p.key?"rgba(201,150,58,.1)":T.white,color:T.dark,fontWeight:bookForm.convPkg===p.key?700:400}}>
            {p.lbl} <span style={{fontSize:10,color:T.darkSoft}}>€{v.sett}/sett · €{v.gg}/gg</span>
          </button>):null;})}
        </div>
      </div>
      {/* Date */}
      <div style={{display:"flex",gap:10}}>
        <div style={{flex:1}}><label style={labelSt}>Arrivo</label><input type="date" value={bookForm.from} onChange={e=>{const f=e.target.value;const t=(bookForm.to||f)<f?f:(bookForm.to||f);const d=Math.max(1,Math.round((new Date(t)-new Date(f))/(86400000))+1);const pr=calcConvPrice(bookForm.convPkg,d,f);setBookForm(prev=>({...prev,from:f,to:t,days:d,prezzoFinale:pr}));}} style={inputSt}/></div>
        <div style={{flex:1}}><label style={labelSt}>Partenza</label><input type="date" value={bookForm.to||bookForm.from} min={bookForm.from} onChange={e=>{const t=e.target.value;const d=Math.max(1,Math.round((new Date(t)-new Date(bookForm.from))/(86400000))+1);const pr=calcConvPrice(bookForm.convPkg,d,bookForm.from);setBookForm(prev=>({...prev,to:t,days:d,prezzoFinale:pr}));}} style={inputSt}/></div>
        <div style={{width:55}}><label style={labelSt}>Giorni</label><div style={{...inputSt,textAlign:"center",fontFamily:fontD,fontSize:16,fontWeight:700,color:T.accent,padding:"10px 4px",background:"rgba(0,0,0,.02)"}}>{bookForm.days}</div></div>
      </div>
      {/* Calcolo breakdown */}
      {pkg&&<div style={{background:"rgba(255,255,255,.6)",borderRadius:8,padding:"8px 12px",fontSize:12}}>
        <div style={{color:T.darkSoft,marginBottom:4}}>📋 Calcolo: <strong>{CONV_PACKAGES.find(p=>p.key===bookForm.convPkg)?.lbl}</strong></div>
        <div style={{color:T.dark}}>
          {weeks>0&&<span>{weeks} sett. × €{pkg.sett} = €{weeks*pkg.sett}</span>}
          {weeks>0&&rem>0&&<span> + </span>}
          {rem>0&&<span>{rem} gg × €{pkg.gg} = €{rem*pkg.gg}</span>}
          <span style={{fontWeight:700,color:T.gold,marginLeft:8}}>= €{autoPrice}</span>
        </div>
      </div>}
      {/* Pezzi extra */}
      <div><label style={labelSt}>🪑 Pezzi aggiuntivi</label>
        <ExtrasSelector extras={bookForm.extras} setExtras={ex=>{const ext=calcExtrasPrice(ex,bookForm.days);setBookForm(p=>({...p,extras:ex,prezzoFinale:autoPrice+ext}));}} pricing={est.pricing} compact/>
        {calcExtrasPrice(bookForm.extras,bookForm.days)>0&&<div style={{fontSize:11,color:T.ok,marginTop:4}}>Extra: +€{calcExtrasPrice(bookForm.extras,bookForm.days)}</div>}
      </div>
      {/* Prezzo finale (override) */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:11,fontWeight:700,color:T.gold}}>💶 Prezzo finale</div><div style={{fontSize:9,color:T.darkSoft}}>Modificabile</div></div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:18,color:T.darkSoft,fontWeight:700}}>€</span>
          <input type="number" min="0" step="0.5" value={bookForm.prezzoFinale||""} onChange={e=>setBookForm(p=>({...p,prezzoFinale:+e.target.value||0}))} style={{width:110,padding:"8px 10px",borderRadius:10,border:`2px solid ${T.gold}`,fontSize:24,fontFamily:fontD,fontWeight:700,textAlign:"center",color:T.dark,background:"rgba(255,255,255,.8)",outline:"none"}}/>
        </div>
      </div>
    </div>);
  };

  /* ═══ NORMAL (non-conv) BOOKING SECTION ═══ */
  const NormalBookingSection=()=>{
    const isCab=bookForm.isCabin||modal?.cell?.type==="cabana";
    const extrasTotal=calcExtrasPrice(bookForm.extras,bookForm.days);
    return(<>
      {/* Pacchetto (solo per ombrelloni) */}
      {!isCab&&<div><label style={labelSt}>📦 Pacchetto</label>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
          {PACKAGES.map(pk=>(<button key={pk.key} onClick={()=>{const price=lookupPrice(pk.key,bookForm.days)+extrasTotal;setBookForm(p=>({...p,pacchetto:pk.key,prezzoFinale:price}));}} style={{padding:"7px 5px",borderRadius:8,fontSize:10,fontFamily:font,cursor:"pointer",textAlign:"center",border:bookForm.pacchetto===pk.key?`2px solid ${T.accent}`:`1px solid ${T.border}`,background:bookForm.pacchetto===pk.key?"rgba(226,97,59,.06)":T.white,color:T.dark,fontWeight:bookForm.pacchetto===pk.key?700:400}}>
            <div style={{fontSize:14,marginBottom:1}}>{pk.icon}</div>{pk.lbl}
          </button>))}
        </div>
      </div>}
      {/* Date */}
      <div style={{display:"flex",gap:10}}>
        <div style={{flex:1}}><label style={labelSt}>Arrivo</label><input type="date" value={bookForm.from} onChange={e=>{const f=e.target.value;const t=(bookForm.to||f)<f?f:(bookForm.to||f);const d=Math.max(1,Math.round((new Date(t)-new Date(f))/(86400000))+1);const base=isCab?lookupPrice("cabina",d):lookupPrice(bookForm.pacchetto,d);const ext=calcExtrasPrice(bookForm.extras,d);setBookForm(p=>({...p,from:f,to:t,days:d,prezzoFinale:base+ext}));}} style={inputSt}/></div>
        <div style={{flex:1}}><label style={labelSt}>Partenza</label><input type="date" value={bookForm.to||bookForm.from} min={bookForm.from} onChange={e=>{const t=e.target.value;const d=Math.max(1,Math.round((new Date(t)-new Date(bookForm.from))/(86400000))+1);const base=isCab?lookupPrice("cabina",d):lookupPrice(bookForm.pacchetto,d);const ext=calcExtrasPrice(bookForm.extras,d);setBookForm(p=>({...p,to:t,days:d,prezzoFinale:base+ext}));}} style={inputSt}/></div>
        <div style={{width:55}}><label style={labelSt}>Giorni</label><div style={{...inputSt,textAlign:"center",fontFamily:fontD,fontSize:16,fontWeight:700,color:T.accent,padding:"10px 4px",background:"rgba(0,0,0,.02)"}}>{bookForm.days}</div></div>
      </div>
      {/* Pezzi extra */}
      <div><label style={labelSt}>🪑 Pezzi aggiuntivi</label>
        <ExtrasSelector extras={bookForm.extras} setExtras={ex=>{const ext=calcExtrasPrice(ex,bookForm.days);const base=isCab?lookupPrice("cabina",bookForm.days):lookupPrice(bookForm.pacchetto,bookForm.days);setBookForm(p=>({...p,extras:ex,prezzoFinale:base+ext}));}} pricing={est.pricing}/>
        {extrasTotal>0&&<div style={{fontSize:11,color:T.ok,marginTop:4}}>Extra: +€{extrasTotal} ({bookForm.days}gg)</div>}
      </div>
      {/* Riepilogo prezzo */}
      <div style={{background:"rgba(14,124,140,.05)",borderRadius:8,padding:"8px 12px",border:`1px solid rgba(14,124,140,.12)`}}>
        <span style={{fontSize:10,color:T.sea,fontWeight:600}}>📋 {isCab?"Cabina":PACKAGES.find(p=>p.key===bookForm.pacchetto)?.lbl} €{isCab?lookupPrice("cabina",bookForm.days):lookupPrice(bookForm.pacchetto,bookForm.days)}{extrasTotal>0?` + Extra €${extrasTotal}`:""} = €{(isCab?lookupPrice("cabina",bookForm.days):lookupPrice(bookForm.pacchetto,bookForm.days))+extrasTotal}</span>
      </div>
      {/* Prezzo finale */}
      <div style={{background:T.goldSoft,borderRadius:10,padding:"12px 14px",border:`1px solid rgba(201,150,58,.25)`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:10,fontWeight:700,color:T.gold,textTransform:"uppercase"}}>💶 Prezzo finale</div></div>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontSize:18,color:T.darkSoft,fontWeight:700}}>€</span>
            <input type="number" min="0" step="0.5" value={bookForm.prezzoFinale||""} onChange={e=>setBookForm(p=>({...p,prezzoFinale:+e.target.value||0}))} style={{width:100,padding:"6px 8px",borderRadius:8,border:`2px solid ${T.gold}`,fontSize:24,fontFamily:fontD,fontWeight:700,textAlign:"center",color:T.dark,background:"rgba(255,255,255,.8)",outline:"none"}}/>
          </div>
        </div>
      </div>
    </>);
  };

  /* ═══ STAGIONALE BOOKING SECTION ═══ */
  const StagionaleSection=()=>{
    const extrasTotal=calcExtrasPrice(bookForm.extras,bookForm.days);
    return(<div style={{background:T.goldSoft,borderRadius:12,border:`1.5px solid rgba(201,150,58,.35)`,padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
    <div style={{fontSize:13,fontWeight:700,color:T.gold}}>⭐ Stagionale · {fmtDate(bookForm.from)} → {fmtDate(bookForm.to)} · {bookForm.days} gg</div>
    <div><label style={labelSt}>🪑 Pezzi aggiuntivi</label>
      <ExtrasSelector extras={bookForm.extras} setExtras={ex=>setBookForm(p=>({...p,extras:ex}))} pricing={est.pricing}/>
      {extrasTotal>0&&<div style={{fontSize:11,color:T.ok,marginTop:4}}>Extra: +€{extrasTotal} ({bookForm.days}gg)</div>}
    </div>
    <label style={labelSt}>💶 Prezzo totale (€)</label>
    <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:20,color:T.darkSoft,fontWeight:700}}>€</span>
      <input autoFocus type="number" min="0" value={bookForm.prezzoFinale||""} onChange={e=>setBookForm(p=>({...p,prezzoFinale:+e.target.value||0}))} placeholder="0" style={{...inputSt,fontSize:26,fontFamily:fontD,fontWeight:700,textAlign:"center",flex:1}}/></div>
  </div>);};

  /* ═══ TIPO ABBONAMENTO SELECTOR ═══ */
  const SubTypeSelector=()=>(<div>
    <label style={labelSt}>Tipo</label>
    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
      {[null,"giornaliero","settimanale","mensile","stagionale"].map(s=>(
        <button key={s||"n"} onClick={()=>{
          if(s==="stagionale"){const seasons=est.seasonPricing||[];const sFrom=seasons.length?seasons.reduce((m,sp)=>sp.from<m?sp.from:m,seasons[0].from):"2026-04-01";const sTo=seasons.length?seasons.reduce((m,sp)=>sp.to>m?sp.to:m,seasons[0].to):"2026-09-30";setBookForm(p=>({...p,sub:s,isHalfDay:false,isConv:false,from:sFrom,to:sTo,days:Math.round((new Date(sTo)-new Date(sFrom))/(86400000))+1}));}
          else setBookForm(p=>({...p,sub:s}));
        }} style={{padding:"5px 10px",borderRadius:7,fontSize:11,fontFamily:font,cursor:"pointer",border:bookForm.sub===s?`2px solid ${s==="stagionale"?T.gold:T.accent}`:`1px solid ${T.border}`,background:bookForm.sub===s?s==="stagionale"?T.goldSoft:"rgba(226,97,59,.08)":T.white,color:T.dark,fontWeight:bookForm.sub===s?700:400}}>
          {s==="stagionale"?"⭐ Stagionale":s||"Nessuno"}
        </button>
      ))}
    </div>
  </div>);

  /* ═══ CONV TOGGLE ═══ */
  const ConvToggle=()=>(bookForm.sub!=="stagionale"?<div style={{borderRadius:10,border:`1.5px solid ${bookForm.isConv?T.gold:T.border}`,overflow:"hidden"}}>
    <div onClick={()=>{const newIsConv=!bookForm.isConv;const pr=newIsConv?calcConvPrice(bookForm.convPkg||"omb_let",bookForm.days,bookForm.from):lookupPrice(bookForm.pacchetto||"omb_let",bookForm.days);setBookForm(p=>({...p,isConv:newIsConv,prezzoFinale:pr}));}} style={{padding:"8px 12px",background:bookForm.isConv?T.goldSoft:"rgba(0,0,0,.02)",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
      <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${bookForm.isConv?T.gold:T.darkSoft}`,background:bookForm.isConv?T.gold:"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10}}>{bookForm.isConv?"✓":""}</div>
      <span style={{fontSize:12,fontWeight:600,color:bookForm.isConv?T.gold:T.dark}}>🤝 Cliente Convenzionato</span>
    </div>
  </div>:null);

  if(page==="login")return(<div style={{minHeight:"100vh",background:T.bg,fontFamily:font,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{...cardS,width:380,textAlign:"center",animation:"pop .3s"}}><h2 style={{fontFamily:fontD,fontSize:26,color:T.dark,marginBottom:4}}>🏖️ Accesso Staff</h2><p style={{color:T.darkSoft,fontSize:13,marginBottom:20}}>Inserisci il PIN</p>
    <input type="password" value={loginPin} onChange={e=>setLoginPin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="PIN" maxLength="8" style={{...inputSt,textAlign:"center",fontSize:28,letterSpacing:10,marginBottom:14}}/>
    <button onClick={handleLogin} style={{...btnS(T.accent),width:"100%",justifyContent:"center",padding:"14px"}}>Accedi</button>
    <button onClick={()=>setPage("beach")} style={{background:"none",border:"none",color:T.darkSoft,cursor:"pointer",fontSize:12,marginTop:12,fontFamily:font}}>← Spiaggia</button>
    <div style={{fontSize:10,color:"rgba(0,0,0,.2)",marginTop:14}}>1234 · 5678 · 0000</div></div></div>);

  return(<div style={{minHeight:"100vh",background:T.bg,fontFamily:font}}>
    <nav style={{background:T.dark,display:"flex",alignItems:"center",padding:"0 16px",height:52,position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginRight:20}}><span style={{fontFamily:fontD,fontSize:20,color:T.gold,fontWeight:700}}>🏖️ {est.name}</span></div>
      <div style={{display:"flex",gap:2,flex:1}}>{NAV.filter(n=>n.id!=="admin"||isAdmin).map(n=><button key={n.id} onClick={()=>setPage(n.id)} style={{padding:"7px 14px",borderRadius:7,border:"none",cursor:"pointer",fontSize:12,fontFamily:font,fontWeight:500,background:page===n.id?"rgba(226,97,59,.15)":"transparent",color:page===n.id?T.accent:"rgba(255,255,255,.55)",transition:"all .15s",display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:14}}>{n.icon}</span><span>{n.lbl}</span></button>)}</div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:10,color:saveStatus==="saved"?"rgba(100,220,100,.8)":"rgba(255,200,0,.8)"}}>{saveStatus==="saved"?"✅":"⏳"}</span>
        {isAdmin?<><span style={{fontSize:10,color:T.gold,background:"rgba(201,150,58,.15)",padding:"3px 8px",borderRadius:5,fontWeight:600}}>🔓 {currentUser?.name}</span><button onClick={()=>{setCurrentUser(null);setPage("beach");}} style={{...btnS("rgba(255,255,255,.08)","rgba(255,255,255,.6)"),padding:"6px 12px",fontSize:11}}>Esci</button></>
        :<button onClick={()=>setPage("login")} style={{...btnS("rgba(255,255,255,.08)","rgba(255,255,255,.6)"),padding:"6px 12px",fontSize:11}}>🔒 Login</button>}
      </div>
    </nav>
    <Notify n={notif}/>
    <main style={{maxWidth:1100,margin:"0 auto",padding:"16px 20px",animation:"slideUp .4s"}}>
      {page==="beach"&&<div>
        <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
          {(()=>{let t=0,b=0,tc=0,bc=0;est.grid.forEach(r=>r.forEach(c=>{if(c.type==="umbrella"){t++;if(c.bookings?.some(bk=>selectedDate>=bk.from&&selectedDate<=bk.to))b++;}}));est.cabins.forEach(r=>r.forEach(c=>{tc++;if(c.bookings?.some(bk=>selectedDate>=bk.from&&selectedDate<=bk.to))bc++;}));
            return[<Stat key="u" icon="🏖️" label="Ombrelloni" value={`${b}/${t}`} color={T.dark} onClick={()=>setOccModal({type:"umbrella"})}/>,<Stat key="c" icon="🏠" label="Cabine" value={`${bc}/${tc}`} color={T.gold} onClick={()=>setOccModal({type:"cabin"})}/>];})()}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><label style={{...labelSt,marginBottom:0}}>Data:</label><input type="date" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)} style={{...inputSt,width:170}}/><button onClick={()=>setSelectedDate(today())} style={{...btnS("rgba(0,0,0,.04)",T.dark),padding:"7px 12px",fontSize:11}}>Oggi</button></div>
        <div style={{display:"flex",flexWrap:"wrap",gap:12,padding:"8px 14px",background:"rgba(0,0,0,.02)",borderRadius:8,marginBottom:12,alignItems:"center"}}>
          <button onClick={startNewBooking} style={{...btnS(T.accent),padding:"10px 20px",fontSize:13}}>+ Nuova Prenotazione</button>
          {[{d:T.ok,l:"Disponibile"},{d:T.warn,l:"Prenotato"}].map((l,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:"50%",background:l.d}}/><span style={{fontSize:11,color:T.darkSoft}}>{l.l}</span></div>)}
        </div>
        <BeachMap grid={est.grid} cabins={est.cabins} selectedDate={selectedDate} onBook={onBook} onBookCabin={onBookCabin}/>
      </div>}
      {page==="calendar"&&<CalendarView grid={est.grid} cabins={est.cabins} selectedDate={selectedDate} setSelectedDate={setSelectedDate}/>}
      {page==="clients"&&<ClientsView clients={clients} setClients={setClients} grid={est.grid} cabins={est.cabins} onAssignUmbrella={(name)=>{setBookForm({clientName:name,from:selectedDate,to:addDays(selectedDate,0),days:1,isHalfDay:false,isConv:false,convPkg:"omb_let",pacchetto:"omb_let",prezzoFinale:0,sub:null,umbrellaNum:null,pickType:"umbrella"});setModal({type:"newbook"});}}/>}
      {page==="inventory"&&<InventoryView inventory={inventory} setInventory={setInventory}/>}
      {page==="dashboard"&&<DashboardView grid={est.grid} cabins={est.cabins} est={est}/>}
      {page==="admin"&&isAdmin&&<AdminPanel est={est} setEst={fn=>setEstRaw(typeof fn==="function"?fn:p=>({...p,...fn}))} users={users} setUsers={setUsers} currentUser={currentUser} setEstRaw={setEstRaw}/>}
    </main>

    {/* ══ BOOK MODAL (from beach map click) ══ */}
    {modal?.type==="book"&&<Modal onClose={()=>setModal(null)} wide>
      <h3 style={{fontFamily:fontD,fontSize:22,color:T.dark,marginBottom:2}}>{modal.cell.type==="cabana"?"🏠 Prenota Cabina":"🏖️ Prenota Ombrellone"}</h3>
      <p style={{color:T.darkSoft,fontSize:12,marginBottom:14}}>{modal.cell.type==="cabana"?`Cabina C${modal.cell.num}`:`Omb. n° ${modal.cell.num} · Fila ${modal.cell.fila}`}</p>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div><label style={labelSt}>Cliente</label><input list="cl-list" value={bookForm.clientName} onChange={e=>setBookForm(p=>({...p,clientName:e.target.value}))} placeholder="Nome" style={inputSt}/><datalist id="cl-list">{clients.map(cl=><option key={cl.id} value={cl.name}/>)}</datalist></div>
        <SubTypeSelector/>
        <ConvToggle/>
        {bookForm.sub==="stagionale"?<StagionaleSection/>:bookForm.isConv?<ConvBookingSection/>:<NormalBookingSection/>}
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setModal(null)} style={{flex:1,padding:"12px",borderRadius:12,border:`1px solid ${T.darkSoft}`,background:"transparent",color:T.darkSoft,cursor:"pointer",fontSize:14,fontFamily:font}}>Annulla</button>
          <button onClick={confirmBooking} style={{flex:1,...btnS(T.accent),justifyContent:"center",padding:"12px",opacity:bookForm.clientName.trim()?1:.5}}>Conferma</button>
        </div>
      </div>
    </Modal>}

    {/* ══ HISTORY MODAL ══ */}
    {modal?.type==="history"&&<Modal onClose={()=>{setModal(null);setEditBk(null);}} wide>
      {(()=>{const{r,c,cell,src}=modal;const isCab=cell.type==="cabana";const allBk=(cell.bookings||[]).slice().sort((a,b)=>a.from.localeCompare(b.from));const activeBk=allBk.filter(b=>selectedDate>=b.from&&selectedDate<=b.to);
        return(<><h3 style={{fontFamily:fontD,fontSize:22,color:T.dark,marginBottom:2}}>{isCab?`🏠 Cabina C${cell.num}`:`🏖️ Omb. n° ${cell.num}`}</h3>
          <p style={{color:T.darkSoft,fontSize:12,marginBottom:6}}>{isCab?"":`Fila ${cell.fila} · `}{allBk.length} prenotazioni</p>
          {activeBk.length>0?<div style={{background:T.warnSoft,borderRadius:10,padding:"10px 14px",marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:T.warn,marginBottom:4}}>🔴 Occupato ({fmtDate(selectedDate)})</div>{activeBk.map(bk=><div key={bk.id} style={{fontSize:13,color:T.dark}}><strong>{bk.clientName}</strong>{bk.isConv?" 🤝":""}{bk.sub==="stagionale"?" ⭐":""} · €{bk.total}</div>)}</div>
          :<div style={{background:T.okSoft,borderRadius:10,padding:"10px 14px",marginBottom:12}}><div style={{fontSize:12,color:T.ok,fontWeight:600}}>🟢 Disponibile</div></div>}

          <div style={{marginBottom:14}}><div style={{fontSize:12,fontWeight:700,color:T.darkSoft,marginBottom:8}}>📋 Prenotazioni</div>
            {allBk.length===0?<div style={{padding:16,textAlign:"center",color:T.darkSoft}}>Nessuna prenotazione.</div>
            :<div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:420,overflowY:"auto"}}>
              {allBk.map(bk=>{const isAct=selectedDate>=bk.from&&selectedDate<=bk.to;const isPast=selectedDate>bk.to;
                const isEditing=editBk?.bkId===bk.id;
                const curExtras=isEditing?editBk.extras:(bk.extras||{lettino:0,sdraio:0,sedia_regista:0});
                const curTotal=isEditing?editBk.total:bk.total;
                return(<div key={bk.id} style={{padding:"12px 14px",borderRadius:12,background:isAct?"rgba(231,76,60,.04)":isPast?"rgba(0,0,0,.02)":"rgba(39,174,96,.04)",border:`1.5px solid ${isAct?"rgba(231,76,60,.12)":"rgba(0,0,0,.06)"}`,transition:"all .15s"}}>
                  {/* Header */}
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,flex:1}}>
                      <span style={{fontWeight:700,fontSize:14,color:T.dark}}>{bk.clientName}</span>
                      {bk.sub==="stagionale"&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:4,background:T.goldSoft,color:T.gold,fontWeight:600}}>STAG</span>}
                      {bk.isConv&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:4,background:"rgba(14,124,140,.1)",color:T.sea,fontWeight:600}}>CONV</span>}
                      {isAct&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:4,background:T.warnSoft,color:T.warn,fontWeight:600}}>ATTIVO</span>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontFamily:fontD,fontSize:18,color:T.accent,fontWeight:700}}>€{curTotal}</span>
                      <button onClick={()=>{freeBk(bk.id,r,c,src);setEditBk(null);setModal({type:"history",r,c,cell:{...cell,bookings:cell.bookings.filter(b=>b.id!==bk.id)},src});}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13}} title="Rimuovi">🗑️</button>
                    </div>
                  </div>
                  <div style={{fontSize:11,color:T.darkSoft,marginBottom:8}}>{fmtDate(bk.from)} → {fmtDate(bk.to)} · {bk.days||1} gg{bk.pacchetto?` · ${PACKAGES.find(p=>p.key===bk.pacchetto)?.lbl||bk.pacchetto}`:""}</div>

                  {/* Pezzi attuali */}
                  {(curExtras.lettino>0||curExtras.sdraio>0||curExtras.sedia_regista>0)&&<div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                    {EXTRA_TYPES.map(t=>curExtras[t.key]>0?<span key={t.key} style={{fontSize:11,padding:"3px 8px",borderRadius:6,background:T.okSoft,color:T.ok,fontWeight:600}}>{t.icon} {curExtras[t.key]}× {t.lbl}</span>:null)}
                  </div>}

                  {/* Modifica pezzi */}
                  {isEditing?(<div style={{display:"flex",flexDirection:"column",gap:8,padding:"10px 0",borderTop:`1px solid ${T.border}`}}>
                    <div style={{fontSize:11,fontWeight:700,color:T.sea}}>✏️ Modifica pezzi e prezzo</div>
                    <ExtrasSelector extras={editBk.extras} setExtras={ex=>setEditBk(p=>({...p,extras:ex}))} pricing={est.pricing} compact/>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:12,color:T.darkSoft}}>💶 Prezzo:</span>
                      <span style={{fontSize:14,color:T.darkSoft}}>€</span>
                      <input type="number" min="0" step="0.5" value={editBk.total||""} onChange={e=>setEditBk(p=>({...p,total:+e.target.value||0}))} style={{width:90,padding:"5px 8px",borderRadius:8,border:`2px solid ${T.accent}`,fontSize:18,fontFamily:fontD,fontWeight:700,textAlign:"center",color:T.dark,outline:"none"}}/>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>{updateBooking(bk.id,r,c,src,{extras:editBk.extras,total:editBk.total});setEditBk(null);const updBk=cell.bookings.map(b=>b.id===bk.id?{...b,extras:editBk.extras,total:editBk.total}:b);setModal({type:"history",r,c,cell:{...cell,bookings:updBk},src});}} style={{...btnS(T.accent),padding:"8px 16px",fontSize:12}}>💾 Salva</button>
                      <button onClick={()=>setEditBk(null)} style={{...btnS("rgba(0,0,0,.06)",T.dark),padding:"8px 16px",fontSize:12}}>Annulla</button>
                    </div>
                  </div>)
                  :(<button onClick={()=>setEditBk({bkId:bk.id,extras:{...(bk.extras||{lettino:0,sdraio:0,sedia_regista:0})},total:bk.total})} style={{background:"none",border:`1px dashed ${T.border}`,borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:11,color:T.sea,fontFamily:font,width:"100%",marginTop:4}}>✏️ Modifica pezzi / prezzo</button>)}
                </div>);})}
            </div>}
          </div>
          <div style={{display:"flex",gap:10}}><button onClick={()=>{setModal(null);setEditBk(null);}} style={{flex:1,padding:"12px",borderRadius:12,border:`1px solid ${T.darkSoft}`,background:"transparent",color:T.darkSoft,cursor:"pointer",fontSize:14,fontFamily:font}}>Chiudi</button><button onClick={()=>{setEditBk(null);startBookFor(r,c,cell,src);}} style={{flex:1,...btnS(T.accent),justifyContent:"center",padding:"12px"}}>+ Nuova prenotazione</button></div>
        </>);})()}
    </Modal>}

    {/* ══ NEWBOOK MODAL ══ */}
    {modal?.type==="newbook"&&<Modal onClose={()=>setModal(null)} wide>
      <h3 style={{fontFamily:fontD,fontSize:22,color:T.dark,marginBottom:2}}>+ Nuova Prenotazione</h3>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div><label style={labelSt}>Tipo</label><div style={{display:"flex",gap:8}}>
          <button onClick={()=>setBookForm(p=>({...p,pickType:"umbrella",umbrellaNum:null,isCabin:false,pacchetto:"omb_let",convPkg:"omb_let"}))} style={{flex:1,padding:"10px",borderRadius:10,cursor:"pointer",fontFamily:font,fontSize:13,fontWeight:600,border:bookForm.pickType==="umbrella"?`2px solid ${T.accent}`:`1.5px solid ${T.border}`,background:bookForm.pickType==="umbrella"?"rgba(226,97,59,.06)":T.white}}>🏖️ Ombrellone</button>
          <button onClick={()=>setBookForm(p=>({...p,pickType:"cabin",umbrellaNum:null,isCabin:true,pacchetto:"cabina",convPkg:"cabina"}))} style={{flex:1,padding:"10px",borderRadius:10,cursor:"pointer",fontFamily:font,fontSize:13,fontWeight:600,border:bookForm.pickType==="cabin"?`2px solid ${T.gold}`:`1.5px solid ${T.border}`,background:bookForm.pickType==="cabin"?T.goldSoft:T.white}}>🏠 Cabina</button>
        </div></div>
        <div><label style={labelSt}>Numero</label><input type="number" min="1" value={bookForm.umbrellaNum||""} onChange={e=>setBookForm(p=>({...p,umbrellaNum:+e.target.value||null}))} style={{...inputSt,fontSize:22,fontFamily:fontD,textAlign:"center",fontWeight:700}}/>
          {bookForm.umbrellaNum&&(()=>{const found=findCellByNum(bookForm.umbrellaNum,bookForm.pickType==="cabin"?"cabana":"umbrella");if(!found)return<div style={{fontSize:11,color:T.warn,marginTop:4}}>❌ Non trovato</div>;const isOcc=found.cell.bookings?.some(b=>selectedDate>=b.from&&b.to>=selectedDate);return<div style={{fontSize:11,marginTop:4,color:isOcc?T.warn:T.ok}}>{isOcc?"⚠️ Occupato":"✅ Disponibile"}</div>;})()}
        </div>
        {bookForm.umbrellaNum&&findCellByNum(bookForm.umbrellaNum,bookForm.pickType==="cabin"?"cabana":"umbrella")&&<>
          <div style={{borderTop:`1px solid ${T.border}`,paddingTop:12}}><label style={labelSt}>Cliente</label><input list="cl-list2" value={bookForm.clientName} onChange={e=>setBookForm(p=>({...p,clientName:e.target.value}))} placeholder="Nome" style={inputSt}/><datalist id="cl-list2">{clients.map(cl=><option key={cl.id} value={cl.name}/>)}</datalist></div>
          <SubTypeSelector/>
          <ConvToggle/>
          {bookForm.sub==="stagionale"?<StagionaleSection/>:bookForm.isConv?<ConvBookingSection/>:<NormalBookingSection/>}
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setModal(null)} style={{flex:1,padding:"12px",borderRadius:12,border:`1px solid ${T.darkSoft}`,background:"transparent",color:T.darkSoft,cursor:"pointer",fontSize:14,fontFamily:font}}>Annulla</button>
            <button onClick={confirmBooking} style={{flex:1,...btnS(T.accent),justifyContent:"center",padding:"12px",opacity:bookForm.clientName.trim()&&bookForm.umbrellaNum?1:.5}}>✅ Conferma</button>
          </div>
        </>}
      </div>
    </Modal>}

    {/* ══ OCCUPANCY MODAL ══ */}
    {occModal&&<Modal onClose={()=>setOccModal(null)} wide>
      {(()=>{const isUmb=occModal.type==="umbrella";const occ=getOccupied(occModal.type,selectedDate);
        const totalItems=isUmb?(()=>{let t=0;est.grid.forEach(r=>r.forEach(c=>{if(c.type==="umbrella")t++;}));return t;})():(()=>{let t=0;est.cabins.forEach(r=>r.forEach(()=>t++));return t;})();
        return(<><h3 style={{fontFamily:fontD,fontSize:22,color:T.dark,marginBottom:2}}>{isUmb?"🏖️ Ombrelloni Occupati":"🏠 Cabine Occupate"}</h3>
          <p style={{color:T.darkSoft,fontSize:12,marginBottom:14}}>{fmtDate(selectedDate)} — {occ.length}/{totalItems} · €{occ.reduce((s,o)=>s+o.total,0)}</p>
          {occ.length===0?<div style={{textAlign:"center",padding:32,color:T.darkSoft}}><div style={{fontSize:36,marginBottom:8}}>{isUmb?"🏖️":"🏠"}</div>Nessun occupato.</div>
          :<div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:400,overflowY:"auto"}}>
            {occ.map((o,i)=>(<div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:i%2===0?"rgba(0,0,0,.02)":"transparent",borderRadius:10}}>
              <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}><div style={{width:36,height:36,borderRadius:8,background:T.warnSoft,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:11,fontWeight:700,color:T.warn}}>{isUmb?o.num:`C${o.num}`}</span></div>
              <div><div style={{fontWeight:700,fontSize:13}}>{o.client}{o.isConv?" 🤝":""}</div><div style={{fontSize:10,color:T.darkSoft}}>{fmtDate(o.from)} → {fmtDate(o.to)}</div></div></div>
              <span style={{fontFamily:fontD,fontSize:16,color:T.accent,fontWeight:700}}>€{o.total}</span>
            </div>))}</div>}
          <button onClick={()=>setOccModal(null)} style={{marginTop:14,width:"100%",padding:"12px",borderRadius:12,border:`1px solid ${T.darkSoft}`,background:"transparent",color:T.darkSoft,cursor:"pointer",fontSize:14,fontFamily:font}}>Chiudi</button>
        </>);})()}
    </Modal>}

    <footer style={{textAlign:"center",padding:"16px",fontSize:10,color:"rgba(110,80,64,.2)",fontStyle:"italic"}}>🌊 Bagno Capri v4.0</footer>
    <AIAssistant est={est} clients={clients} currentUser={currentUser}/>
  </div>);
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
